stack:
  - javascript
  - golang

workflows:
  - id: default
    on: [precommit, prepush]
    steps:
      # Internal tools
      - validate-eof
      - validate-trailing-whitespace
      - validate-bom
      - validate-line-endings
      - validate-large-files:
          maxKb: 1024
      - validate-case-conflict
      - validate-merge-conflict
      - validate-json:
          exclude:
            - ".eser/recipes/"
            - "tsconfig.json"
      - validate-toml
      - validate-yaml:
          allowMultipleDocuments: true
      - validate-symlinks
      - validate-shebangs
      - validate-secrets:
          allowMissingCredentials: true
          exclude:
            - ".claude/skills/"
      - validate-filenames:
          rules:
            - directory: "apps/services/"
              convention: "snake_case"
              exclude:
                - "Dockerfile"
                - "Makefile"
                - "README.md"
            - directory: "*"
              convention: "kebab-case"
              exclude:
                - ".claude/"
                - ".github/"
                - ".git/COMMIT_EDITMSG"
                - "AGENTS.md"
                - "CHANGELOG.md"
                - "CLAUDE.md"
                - "Makefile"
                - "VERSION"
                - "apps/services/"
                - "docs/"
                - "etc/coverage/"
                - "etc/temp/"
                - ".eser/recipes/"
                - "Dockerfile"
                - "LICENSE"
                - "README.md"
                - "TODOS.md"
                - "pkg/*/README.md"
                - "*_test.ts"
                - "*_test.go"
      - validate-submodules
      - validate-licenses:
          exclude:
            - ".eser/recipes/"
      - validate-runtime-js-apis:
          exclude:
            - "pkg/@eser/standards/cross-runtime/"
            - "pkg/@eser/cli/scripts/compile.ts"

      # Deno checks
      - shell:
          name: deno-formatter
          command: deno fmt --check
          fixCommand: deno fmt
      - shell:
          name: deno-linter
          command: deno lint
          fixCommand: deno lint --fix
      - shell:
          name: deno-type-check
          command: deno check ./pkg/@eser/*/mod.ts ./pkg/@cool/*/mod.ts
          timeout: 120
      - shell:
          name: deno-tests
          command: deno test --allow-sys --allow-net --allow-env --allow-read --allow-write --allow-run --allow-ffi --parallel --trace-leaks --coverage=./etc/coverage/
          timeout: 300
      - shell:
          name: deno-publish-check
          command: deno publish --dry-run --allow-dirty
          timeout: 120

      # Go checks (apps/services)
      - shell:
          name: go-check
          command: "go vet ./... && go build ./..."
          workingDirectory: ./apps/services/
          timeout: 120
      - shell:
          name: go-lint
          command: "go tool golangci-lint run ./..."
          fixCommand: "gofmt -w . && go tool golangci-lint run --fix ./..."
          workingDirectory: ./apps/services/
          timeout: 120
      - shell:
          name: go-tests
          command: "go test -race ./..."
          workingDirectory: ./apps/services/
          timeout: 300

  - id: commit-validation
    on: [commitmsg]
    steps:
      - validate-commit-msg:
          forceScope: true
          strict: true
          types:
            - ci
            - chore
            - docs
            - feat
            - fix
            - perf
            - refactor
            - revert
            - test

scripts:
  # Validation
  ok: eser workflows run -e precommit
  fix: eser workflows run -e precommit --fix

  # Setup
  init: deno install && eser codebase install

  # Testing
  test:
    command: deno test --allow-sys --allow-net --allow-env --allow-read --allow-write --allow-run --allow-ffi --parallel --trace-leaks --coverage=./etc/coverage/
    description: Run tests with coverage
  test-watch:
    command: deno test --allow-sys --allow-net --allow-env --allow-read --allow-write --allow-run --allow-ffi --parallel --watch
    description: Run tests in watch mode

  # Code quality
  lint: deno lint
  fmt: deno fmt
  check: deno check ./pkg/@eser/*/mod.ts ./pkg/@cool/*/mod.ts

  # Build
  build: deno run --allow-all ./pkg/@eser/cli/scripts/npm-build.ts
  compile: deno run --allow-all ./pkg/@eser/cli/scripts/compile.ts

  # Documentation
  docs: "rm -rf ./docs/ && deno doc --name='eserstack' --output=./docs/ --html ./pkg/@eser/*/mod.ts ./pkg/@cool/*/mod.ts"
  docs-lint: deno doc --lint ./pkg/@eser/*/mod.ts ./pkg/@cool/*/mod.ts

  # Docker
  container-build: docker build -t eservm .
  container-run: docker run --interactive --tty --rm eservm

  # Maintenance
  clean: "rm -rf ./etc/coverage/* ./etc/coverage.lcov ./deno.lock && deno check ./pkg/@eser/*/mod.ts ./pkg/@cool/*/mod.ts"
  repl: deno repl --allow-all --unstable-bundle --eval-file=./repl-init.ts

  # Coverage
  coverage: deno coverage ./etc/coverage/
  coverage-gen: deno coverage ./etc/coverage --lcov --output=./etc/coverage.lcov

  # Release
  version-bump: eser codebase versions
  tag: eser codebase gh release-tag
  release-notes: eser codebase gh release-notes
  changelog: eser codebase changelog-gen

  # Go shortcuts
  go-ok:
    command: make ok
    workingDirectory: ./apps/services/
  go-test:
    command: make test-coverage
    workingDirectory: ./apps/services/
  go-lint:
    command: make lint
    workingDirectory: ./apps/services/
  go-fmt:
    command: make fix
    workingDirectory: ./apps/services/
  go-build:
    command: make build
    workingDirectory: ./apps/services/
