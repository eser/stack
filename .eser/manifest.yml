stack:
  - javascript
  - golang

workflows:
  - id: default
    on: [precommit, prepush]
    steps:
      # Internal tools
      - validate-eof
      - validate-trailing-whitespace
      - validate-bom
      - validate-line-endings
      - validate-large-files:
          maxKb: 1024
      - validate-case-conflict
      - validate-merge-conflict
      - validate-json:
          exclude:
            - ".eser/recipes/"
            - "tsconfig.json"
      - validate-toml
      - validate-yaml:
          allowMultipleDocuments: true
      - validate-symlinks
      - validate-shebangs
      - validate-secrets:
          allowMissingCredentials: true
          exclude:
            - ".claude/skills/"
      - validate-filenames:
          rules:
            - directory: "cmd/"
              convention: "snake_case"
              exclude:
                - "Makefile"
                - "README.md"
            - directory: "pkg/ajan/"
              convention: "snake_case"
              exclude:
                - "Makefile"
                - "README.md"
            - directory: "pkg/@eserstack/ajan/"
              convention: "snake_case"
              exclude:
                - "Dockerfile"
                - "Makefile"
                - "README.md"
            - directory: "*"
              convention: "kebab-case"
              exclude:
                - ".claude/"
                - ".github/"
                - ".git/COMMIT_EDITMSG"
                - "AGENTS.md"
                - "CHANGELOG.md"
                - "CLAUDE.md"
                - "Makefile"
                - "PHILOSOPHY.md"
                - "VERSION"
                - "cmd/"
                - "pkg/ajan/"
                - "pkg/@eserstack/ajan/"
                - "docs/"
                - "etc/coverage/"
                - "etc/temp/"
                - ".eser/recipes/"
                - "Dockerfile"
                - "LICENSE"
                - "README.md"
                - "TODOS.md"
                - "pkg/*/README.md"
                - "pkg/@eserstack/noskills/README-HOW.md"
                - "*_test.ts"
                - "*_test.go"
      - validate-submodules
      - validate-licenses:
          exclude:
            - ".eser/recipes/"
      - validate-runtime-js-apis:
          exclude:
            - "pkg/@eserstack/standards/cross-runtime/"
            - "pkg/@eserstack/cli/scripts/compile.ts"

      # Deno checks
      - shell:
          name: deno-formatter
          command: deno fmt --check
          fixCommand: deno fmt
      - shell:
          name: deno-linter
          command: deno lint
          fixCommand: deno lint --fix
      - shell:
          name: deno-type-check
          command: deno check ./pkg/@eserstack/*/mod.ts ./pkg/@cool/*/mod.ts
          timeout: 120
      - shell:
          name: deno-tests
          command: deno test --allow-sys --allow-net --allow-env --allow-read
            --allow-write --allow-run --allow-ffi --parallel --trace-leaks
            --coverage=./etc/coverage/
          timeout: 300
      - shell:
          name: deno-publish-check
          command: deno publish --dry-run --allow-dirty
          timeout: 120

      # Go checks (cmd/ajan, pkg/@eserstack/ajan/go)
      - shell:
          name: go-check
          command: "go vet ./... && go build ./..."
          timeout: 120
      - shell:
          name: go-lint
          command: "go tool golangci-lint run ./..."
          fixCommand: "gofmt -w . && go tool golangci-lint run --fix ./..."
          timeout: 120
      - shell:
          name: go-tests
          command: "go test -race ./..."
          timeout: 300

  - id: commit-validation
    on: [commitmsg]
    steps:
      - validate-commit-msg:
          forceScope: true
          strict: true
          types:
            - ci
            - chore
            - docs
            - feat
            - fix
            - perf
            - refactor
            - revert
            - test

scripts:
  # Validation
  ok: eser workflows run -e precommit
  fix: eser workflows run -e precommit --fix

  # Setup
  init: pnpm install && eser codebase install

  # Testing
  test:
    command: deno test --allow-sys --allow-net --allow-env --allow-read
      --allow-write --allow-run --allow-ffi --parallel --trace-leaks
      --coverage=./etc/coverage/
    description: Run tests with coverage
  test-watch:
    command: deno test --allow-sys --allow-net --allow-env --allow-read
      --allow-write --allow-run --allow-ffi --parallel --watch
    description: Run tests in watch mode

  # Code quality
  lint: deno lint
  fmt: deno fmt
  check: deno check ./pkg/@eserstack/*/mod.ts ./pkg/@cool/*/mod.ts

  # Build
  build: deno run --allow-all ./pkg/@eserstack/cli/scripts/npm-build.ts
  compile: deno run --allow-all ./pkg/@eserstack/cli/scripts/compile.ts

  # Documentation
  docs: "rm -rf ./docs/ && deno doc --name='eserstack' --output=./docs/ --html
    ./pkg/@eserstack/*/mod.ts ./pkg/@cool/*/mod.ts"
  docs-lint: deno doc --lint ./pkg/@eserstack/*/mod.ts ./pkg/@cool/*/mod.ts

  # Docker
  container-build: docker build -t eservm .
  container-run: docker run --interactive --tty --rm eservm

  # Maintenance
  clean: "rm -rf ./etc/coverage/* ./etc/coverage.lcov ./pnpm-lock.yaml && deno check
    ./pkg/@eserstack/*/mod.ts ./pkg/@cool/*/mod.ts"
  repl: deno repl --allow-all --unstable-bundle --eval-file=./repl-init.ts

  # Coverage
  coverage: deno coverage ./etc/coverage/
  coverage-gen: deno coverage ./etc/coverage --lcov --output=./etc/coverage.lcov

  # Release
  version-bump: eser codebase versions
  tag: eser codebase gh release-tag
  release-notes: eser codebase gh release-notes
  changelog: eser codebase changelog-gen

  # Go shortcuts
  go-ok: make ok
  go-test: make test-coverage
  go-lint: make lint
  go-fmt: make fix
  go-build: make build
noskills:
  # noskills orchestrator — inline comments in this section won't be preserved on next write
  concerns:
    - open-source
    - beautiful-product
    - long-lived
    - well-engineered
    - developer-experience
    - root-cause
    - security-audited
    - peer-reviewed
    - ship-ready
    - documented
    - deploy-ready
  tools:
    - claude-code
  providers:
    - claude-code
    - opencode
  project:
    languages:
      - typescript
    frameworks: []
    ci:
      - github-actions
    testRunner: deno
  maxIterationsBeforeRestart: 15
  verifyCommand: null
  allowGit: false
  command: deno task cli noskills
