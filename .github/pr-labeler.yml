# Labeler configuration for actions/labeler
# Auto-label PRs based on changed file paths

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**"

ci/cd:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

claude-code:
  - changed-files:
      - any-glob-to-any-file:
          - ".claude/**"
          - "CLAUDE.md"
          - "AGENTS.md"

templates:
  - changed-files:
      - any-glob-to-any-file:
          - "etc/templates/**"

pkg:fp:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/fp/**"

pkg:di:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/di/**"

pkg:cli:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/cli/**"

pkg:events:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/events/**"

pkg:config:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/config/**"

pkg:http:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/http/**"

pkg:shell:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/shell/**"

pkg:standards:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/standards/**"

pkg:testing:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/testing/**"

pkg:bundler:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/bundler/**"

pkg:laroux:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/laroux/**"
          - "pkg/@eserstack/laroux-*/**"

pkg:jsx-runtime:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/jsx-runtime/**"

pkg:cache:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/cache/**"

pkg:logging:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/logging/**"

pkg:primitives:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/primitives/**"

pkg:parsing:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/parsing/**"

pkg:crypto:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/crypto/**"

pkg:writer:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/@eserstack/writer/**"

go:
  - changed-files:
      - any-glob-to-any-file:
          - "cmd/ajan/**"
          - "pkg/ajan/**"
