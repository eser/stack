name: Integrity Pipeline

on:
  push:
    branches:
      - "**"

  pull_request:
    types:
      - opened
      - edited
      - synchronize
    branches:
      - "**"

  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.ref }}-integrity
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Always runs ─────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: apps/services/go.sum

      - name: Run validation
        run: deno task cli ok

      - name: Generate coverage report
        run: deno coverage ./etc/coverage --lcov --output=./etc/coverage.lcov
        continue-on-error: true

      - name: Upload coverage
        if: hashFiles('etc/coverage.lcov') != ''
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./etc/coverage.lcov

  # ── Release: tag ────────────────────────────────────────────────
  tag-release:
    name: Tag Release
    needs: validate
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'chore(codebase): release v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create and push version tag
        run: |
          VERSION=$(cat VERSION)
          TAG="v$VERSION"

          # Remove existing tag if present (idempotent for re-releases)
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo "### Tagged $TAG" >> $GITHUB_STEP_SUMMARY

  # ── Release: smoke test ─────────────────────────────────────────
  smoke-test:
    name: npm Smoke Test
    needs: tag-release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Build npm package
        run: deno task cli build

      - name: Smoke test — help
        run: node pkg/@eser/cli/dist/eser.js --help

      - name: Smoke test — validate-licenses
        run: node pkg/@eser/cli/dist/eser.js codebase validate-licenses || true

      - name: Upload npm bundle
        uses: actions/upload-artifact@v7
        with:
          name: npm-bundle
          path: pkg/@eser/cli/dist/

  # ── Release: publish ────────────────────────────────────────────
  publish:
    name: Publish
    needs: [tag-release, smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Publish to JSR
        run: deno publish

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"
          registry-url: "https://registry.npmjs.org"

      - name: Download npm bundle
        uses: actions/download-artifact@v8
        with:
          name: npm-bundle
          path: pkg/@eser/cli/dist/

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: ./pkg/@eser/cli/dist

      - name: Summary
        run: |
          VERSION=$(cat VERSION)
          echo "### Published v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **JSR:** https://jsr.io/@eser" >> $GITHUB_STEP_SUMMARY
          echo "- **npm:** https://www.npmjs.com/package/eser/v/$VERSION" >> $GITHUB_STEP_SUMMARY

  # ── Release: sync release notes ────────────────────────────────
  release-notes:
    name: Sync Release Notes
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Sync CHANGELOG to GitHub Release
        run: deno task cli codebase gh release-notes --create-if-missing
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Release: compile standalone binaries ──────────────────────
  compile-binaries:
    name: Compile Binaries
    needs: tag-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile for all platforms
        run: deno run --allow-all ./pkg/@eser/cli/scripts/compile.ts

      - name: Upload binary bundle
        uses: actions/upload-artifact@v7
        with:
          name: binary-bundle
          path: etc/temp/binaries/

  # ── Release: upload assets + sign ─────────────────────────────
  upload-assets:
    name: Upload & Sign Assets
    needs: [compile-binaries, release-notes]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download binary bundle
        uses: actions/download-artifact@v8
        with:
          name: binary-bundle
          path: binaries/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign archives
        run: |
          cd binaries
          for f in *.tar.gz *.zip; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --bundle "${f}.bundle" "$f"
          done

      - name: Upload to GitHub Release
        run: |
          VERSION=$(cat VERSION)
          TAG="v$VERSION"
          gh release upload "$TAG" --clobber \
            binaries/*.tar.gz \
            binaries/*.zip \
            binaries/*.bundle \
            binaries/SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          VERSION=$(cat VERSION)
          echo "### Binary assets uploaded for v$VERSION" >> $GITHUB_STEP_SUMMARY
          ls -lh binaries/*.tar.gz binaries/*.zip 2>/dev/null | while read line; do
            echo "- $line" >> $GITHUB_STEP_SUMMARY
          done

  # ── Release: update Homebrew tap ──────────────────────────────
  update-homebrew:
    name: Update Homebrew Tap
    needs: upload-assets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ESER_APP_ID }}
          private-key: ${{ secrets.ESER_APP_PRIVATE_KEY }}
          owner: eser
          repositories: homebrew-tap

      - name: Update formula
        run: deno run --allow-all ./etc/scripts/update-homebrew-formula.ts
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # ── Release: update Nix hashes ────────────────────────────────
  update-nix-hashes:
    name: Update Nix Hashes
    needs: upload-assets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ESER_APP_ID }}
          private-key: ${{ secrets.ESER_APP_PRIVATE_KEY }}
          owner: eser
          repositories: stack

      - name: Update hashes
        run: deno run --allow-all ./etc/scripts/update-nix-hashes.ts

      - name: Commit and push
        run: |
          VERSION=$(cat VERSION)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nix/hashes.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(nix): update binary hashes for v$VERSION"
          git push
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
