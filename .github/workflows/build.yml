name: Integrity Pipeline

on:
  push:
    branches:
      - "**"

  pull_request:
    types:
      - opened
      - edited
      - synchronize
    branches:
      - "**"

  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.ref }}-integrity
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Always runs ─────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubicloud-standard-4-arm
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: deno-${{ runner.arch }}-${{ hashFiles('deno.json', '**/deno.json', '**/package.json') }}
          restore-keys: deno-${{ runner.arch }}-

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: apps/services/go.sum

      - name: Run validation
        run: deno task cli ok

      - name: Generate coverage report
        run: deno coverage ./etc/coverage --lcov --output=./etc/coverage.lcov
        continue-on-error: true

      - name: Upload coverage
        if: hashFiles('etc/coverage.lcov') != ''
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./etc/coverage.lcov

  # ── Release: tag ────────────────────────────────────────────────
  tag-release:
    name: Tag Release
    needs: validate
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'chore(codebase): release v')
    runs-on: ubicloud-standard-2-arm
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create and push version tag
        run: |
          VERSION=$(cat VERSION)
          TAG="v$VERSION"

          # Remove existing tag if present (idempotent for re-releases)
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo "### Tagged $TAG" >> $GITHUB_STEP_SUMMARY

  # ── Release: smoke test ─────────────────────────────────────────
  smoke-test:
    name: npm Smoke Test
    needs: tag-release
    runs-on: ubicloud-standard-4-arm
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: deno-${{ runner.arch }}-${{ hashFiles('deno.json', '**/deno.json', '**/package.json') }}
          restore-keys: deno-${{ runner.arch }}-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Build eser npm package
        run: deno task cli build

      - name: Build noskills npm package
        run: deno run --allow-all pkg/@eser/noskills/scripts/npm-build.ts

      - name: Build laroux npm package
        run: deno run --allow-all pkg/@eser/laroux-server/scripts/npm-build.ts

      - name: Smoke test — eser help
        run: node pkg/@eser/cli/dist/eser.js --help

      - name: Smoke test — eser validate-licenses
        run: node pkg/@eser/cli/dist/eser.js codebase validate-licenses || true

      - name: Smoke test — noskills help
        run: node pkg/@eser/noskills/dist/noskills.js --help

      - name: Smoke test — laroux help
        run: node pkg/@eser/laroux-server/dist/laroux.js --help

      - name: Upload eser npm bundle
        uses: actions/upload-artifact@v7
        with:
          name: npm-eser
          path: pkg/@eser/cli/dist/

      - name: Upload noskills npm bundle
        uses: actions/upload-artifact@v7
        with:
          name: npm-noskills
          path: pkg/@eser/noskills/dist/

      - name: Upload laroux npm bundle
        uses: actions/upload-artifact@v7
        with:
          name: npm-laroux
          path: pkg/@eser/laroux-server/dist/

  # ── npm-only smoke test (no Deno) ──────────────────────────
  npm-no-deno-test:
    name: npm Install Test (no Deno)
    needs: smoke-test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Setup Node.js only
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Verify Deno is NOT installed
        run: |
          if command -v deno &>/dev/null; then
            echo "::error::Deno is installed — this job must run without Deno"
            exit 1
          fi
          echo "Confirmed: Deno is not installed"

      - name: Download eser npm bundle
        uses: actions/download-artifact@v8
        with:
          name: npm-eser
          path: npm-eser/

      - name: Install eser globally from artifact
        run: npm install -g ./npm-eser/

      - name: Smoke test — eser --help
        run: eser --help

      - name: Smoke test — eser version
        run: eser version

      - name: Smoke test — eser ajan version (graceful failure)
        run: |
          set +e
          OUTPUT=$(eser ajan version 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -qi "deno"; then
            echo "::error::Error message mentions Deno — npm package must not require Deno"
            exit 1
          fi

          if [ $EXIT_CODE -eq 0 ]; then
            echo "eser ajan version succeeded (unexpected but acceptable)"
          else
            echo "eser ajan version failed as expected (no shared library in npm package)"
            echo "Error output does NOT mention Deno — PASS"
          fi

  # ── Cross-runtime testing ──────────────────────────────────
  cross-runtime-test:
    name: Cross-Runtime Test (${{ matrix.runtime }} on ${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    continue-on-error: ${{ matrix.runtime != 'deno' }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, macos-latest]
        runtime: [deno, node, bun]
        include:
          - runtime: deno
            version: "2.7"
          - runtime: node
            version: "25"
          - runtime: bun
            version: "1.3"

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: deno-${{ runner.arch }}-${{ hashFiles('deno.json', '**/deno.json', '**/package.json') }}
          restore-keys: deno-${{ runner.arch }}-

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: apps/services/go.sum

      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.version }}

      - name: Build Go shared library (native)
        run: deno run --allow-all pkg/@eser/ajan/scripts/build.ts

      - name: Verify FFI — eser ajan version
        env:
          ESER_AJAN_WASM: disabled
          ESER_AJAN_LIB_PATH: ${{ github.workspace }}/pkg/@eser/ajan/dist/${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ runner.os == 'macOS' && 'darwin' || 'linux' }}/libeser_ajan.${{ runner.os == 'macOS' && 'dylib' || 'so' }}
        run: |
          if [ "${{ matrix.runtime }}" = "deno" ]; then
            deno task cli ajan version
          elif [ "${{ matrix.runtime }}" = "node" ]; then
            deno task cli build
            node pkg/@eser/cli/dist/eser.js ajan version
          elif [ "${{ matrix.runtime }}" = "bun" ]; then
            deno task cli build
            bun pkg/@eser/cli/dist/eser.js ajan version
          fi

      - name: Verify CLI — eser --help
        run: |
          if [ "${{ matrix.runtime }}" = "deno" ]; then
            deno task cli --help
          elif [ "${{ matrix.runtime }}" = "node" ]; then
            node pkg/@eser/cli/dist/eser.js --help
          elif [ "${{ matrix.runtime }}" = "bun" ]; then
            bun pkg/@eser/cli/dist/eser.js --help
          fi

  # ── Release: publish ────────────────────────────────────────────
  publish:
    name: Publish
    needs: [tag-release, smoke-test]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: deno-${{ runner.arch }}-${{ hashFiles('deno.json', '**/deno.json', '**/package.json') }}
          restore-keys: deno-${{ runner.arch }}-

      - name: Publish to JSR
        run: deno publish

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"
          registry-url: "https://registry.npmjs.org"

      - name: Download eser npm bundle
        uses: actions/download-artifact@v8
        with:
          name: npm-eser
          path: npm-dist/eser/

      - name: Download noskills npm bundle
        uses: actions/download-artifact@v8
        with:
          name: npm-noskills
          path: npm-dist/noskills/

      - name: Download laroux npm bundle
        uses: actions/download-artifact@v8
        with:
          name: npm-laroux
          path: npm-dist/laroux/

      - name: Publish eser to npm
        run: npm publish --provenance --access public
        working-directory: npm-dist/eser

      - name: Publish noskills to npm
        run: npm publish --provenance --access public
        working-directory: npm-dist/noskills

      - name: Publish laroux to npm
        run: npm publish --provenance --access public
        working-directory: npm-dist/laroux

      - name: Summary
        run: |
          VERSION=$(cat VERSION)
          echo "### Published v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **JSR:** https://jsr.io/@eser" >> $GITHUB_STEP_SUMMARY
          echo "- **npm (eser):** https://www.npmjs.com/package/eser/v/$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **npm (noskills):** https://www.npmjs.com/package/noskills/v/$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **npm (laroux):** https://www.npmjs.com/package/laroux/v/$VERSION" >> $GITHUB_STEP_SUMMARY

  # ── Release: sync release notes ────────────────────────────────
  release-notes:
    name: Sync Release Notes
    needs: publish
    runs-on: ubicloud-standard-2-arm

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: deno-${{ runner.arch }}-${{ hashFiles('deno.json', '**/deno.json', '**/package.json') }}
          restore-keys: deno-${{ runner.arch }}-

      - name: Sync CHANGELOG to GitHub Release
        run: |
          VERSION=$(cat VERSION)
          deno task cli codebase gh release-notes --tag "v$VERSION" --create-if-missing
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Release: compile standalone binaries ──────────────────────
  compile-binaries:
    name: Compile Binaries
    needs: tag-release
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: deno-${{ runner.arch }}-${{ hashFiles('deno.json', '**/deno.json', '**/package.json') }}
          restore-keys: deno-${{ runner.arch }}-

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: apps/services/go.sum

      - name: Install cross-compilers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-x86-64-linux-gnu \
            gcc-mingw-w64-x86-64
          # Note: gcc-mingw-w64 for aarch64-windows is not available in apt.
          # Windows ARM64 cross-compilation requires a separate toolchain.
          # Darwin targets require osxcross which is not installed here.
          # These targets will be skipped by build.ts (continue-on-error below).

      - name: Build Go shared libraries (all native targets)
        run: deno run --allow-all pkg/@eser/ajan/scripts/build.ts --all
        continue-on-error: true

      - name: Build Go WASM modules
        run: deno run --allow-all pkg/@eser/ajan/scripts/build.ts --wasm

      - name: Generate npm packages for ajan
        run: deno run --allow-all pkg/@eser/ajan/npm/generate-packages.ts

      - name: Compile for all platforms
        run: deno run --allow-all ./pkg/@eser/cli/scripts/compile.ts

      - name: Upload binary bundle
        uses: actions/upload-artifact@v7
        with:
          name: binary-bundle
          path: etc/temp/binaries/

  # ── Release: upload assets + sign ─────────────────────────────
  upload-assets:
    name: Upload & Sign Assets
    needs: [compile-binaries, release-notes]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download binary bundle
        uses: actions/download-artifact@v8
        with:
          name: binary-bundle
          path: binaries/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign archives
        run: |
          cd binaries
          for f in *.tar.gz *.zip; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --bundle "${f}.bundle" "$f"
          done

      - name: Upload to GitHub Release
        run: |
          VERSION=$(cat VERSION)
          TAG="v$VERSION"
          gh release upload "$TAG" --clobber \
            binaries/*.tar.gz \
            binaries/*.zip \
            binaries/*.bundle \
            binaries/SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          VERSION=$(cat VERSION)
          echo "### Binary assets uploaded for v$VERSION" >> $GITHUB_STEP_SUMMARY
          ls -lh binaries/*.tar.gz binaries/*.zip 2>/dev/null | while read line; do
            echo "- $line" >> $GITHUB_STEP_SUMMARY
          done

  # ── Release: update Homebrew tap ──────────────────────────────
  update-homebrew:
    name: Update Homebrew Tap
    needs: upload-assets
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 5
    continue-on-error: true

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: deno-${{ runner.arch }}-${{ hashFiles('deno.json', '**/deno.json', '**/package.json') }}
          restore-keys: deno-${{ runner.arch }}-

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ESER_APP_ID }}
          private-key: ${{ secrets.ESER_APP_PRIVATE_KEY }}
          owner: eser
          repositories: homebrew-tap

      - name: Update formula
        run: deno run --allow-all ./etc/scripts/update-homebrew-formula.ts
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # ── Release: update Nix hashes ────────────────────────────────
  update-nix-hashes:
    name: Update Nix Hashes
    needs: upload-assets
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 5
    continue-on-error: true

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: deno-${{ runner.arch }}-${{ hashFiles('deno.json', '**/deno.json', '**/package.json') }}
          restore-keys: deno-${{ runner.arch }}-

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ESER_APP_ID }}
          private-key: ${{ secrets.ESER_APP_PRIVATE_KEY }}
          owner: eser
          repositories: stack

      - name: Update hashes
        run: deno run --allow-all ./etc/scripts/update-nix-hashes.ts

      - name: Commit and push
        run: |
          VERSION=$(cat VERSION)
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/eser/stack.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nix/hashes.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(nix): update binary hashes for v$VERSION"
          git push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
