name: Deployment Pipeline

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  version-check:
    name: Version Check
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(cat VERSION)
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match VERSION file ($VERSION)"
            exit 1
          fi
          echo "✓ Tag v$TAG matches VERSION $VERSION"

  smoke-test:
    name: npm Smoke Test
    needs: version-check
    if: ${{ !cancelled() && (needs.version-check.result == 'success' || needs.version-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Build npm package
        run: deno task npm-build

      - name: Smoke test — help
        run: node pkg/@eser/cli/dist/eser.js --help

      - name: Smoke test — validate-licenses
        run: node pkg/@eser/cli/dist/eser.js codebase validate-licenses || true
        # || true because the checkout may have files without license headers

      - name: Upload npm bundle
        uses: actions/upload-artifact@v4
        with:
          name: npm-bundle
          path: pkg/@eser/cli/dist/

  publish:
    name: Publish
    needs: [version-check, smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write # OIDC for JSR authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Publish to JSR
        run: deno publish

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"
          registry-url: "https://registry.npmjs.org"

      - name: Download npm bundle
        uses: actions/download-artifact@v4
        with:
          name: npm-bundle
          path: pkg/@eser/cli/dist/

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: ./pkg/@eser/cli/dist

      - name: Summary
        run: |
          VERSION=$(cat VERSION)
          echo "### ✓ Published v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **JSR:** https://jsr.io/@eser" >> $GITHUB_STEP_SUMMARY
          echo "- **npm:** https://www.npmjs.com/package/eser/v/$VERSION" >> $GITHUB_STEP_SUMMARY
