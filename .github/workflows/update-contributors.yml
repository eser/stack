name: Update Contributors

on:
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 3 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Update contributor list
        run: deno task cli codebase gh contributors --commit
        env:
          GH_TOKEN: ${{ github.token }}
