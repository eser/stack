version: "2"

run:
  go: "1.25"
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - errorlint
    - gosec

  settings:
    gosec:
      excludes:
        - G115
        - G101  # Example/test credentials — not real secrets
        - G204  # exec.Command("git", ...) is intentional throughout; production sites have //nolint:gosec
        - G301  # 0o755 is appropriate for project/test dirs; production sites have //nolint:gosec
        - G306  # 0o644 is appropriate for text files; production sites have //nolint:gosec

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

formatters:
  enable:
    - gofmt
    - goimports
