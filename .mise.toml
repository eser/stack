# mise (formerly rtx) configuration for local development
# For Nix users: flake.nix already provides deno, go, node, git via devShell.
# This file is for contributors who prefer mise over Nix.

[tools]
node = "25"
bun = "1.3"
deno = "2.7"
go = "1.25"

[env]
# Optional: ensure Go shared library is found during development
# ESER_AJAN_LIB_PATH is auto-resolved by the FFI module

[tasks.build-go]
run = "deno run --allow-all pkg/@eserstack/ajan/scripts/build.ts"
description = "Build Go shared library for current platform"

[tasks.build-go-all]
run = "deno run --allow-all pkg/@eserstack/ajan/scripts/build.ts --all"
description = "Build Go shared library for all platforms"

[tasks.build-wasm]
run = "deno run --allow-all pkg/@eserstack/ajan/scripts/build.ts --wasm"
description = "Build Go WASM modules"

[tasks.test-ffi]
run = "deno task cli go version"
description = "Verify FFI bridge works"
