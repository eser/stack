default_install_hook_types:
  - pre-commit
  - commit-msg

default_stages:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-executables-have-shebangs
      - id: check-json
        exclude: |
          (?x)^(
            etc/templates/vite-app/tsconfig.app.json|
            etc/templates/cf-workers-app/tsconfig.json|
            tsconfig.json
          )$
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: destroyed-symlinks
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-new-submodules
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: pretty-format-json
        args: ["--autofix", "--no-ensure-ascii", "--no-sort-keys"]
        exclude: |
          (?x)^(
            etc/templates/vite-app/tsconfig.app.json|
            etc/templates/cf-workers-app/tsconfig.json|
            tsconfig.json
          )$
      - id: trailing-whitespace
      # - id: no-commit-to-branch
      #   args: ["--branch", "main"]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [
          "--force-scope",
          "--strict",
          "--verbose",
          "ci",
          "chore",
          "docs",
          "feat",
          "fix",
          "perf",
          "refactor",
          "revert",
          "test",
        ]

  - repo: local
    hooks:
      - id: local-validation
        name: local pre-commit validation
        description: Validate formatting, linting, license headers, types and run tests.
        entry: bash -c 'make ok; git add -u' --
        # types_or: [javascript, jsx, ts, tsx, json, markdown]
        always_run: true
        pass_filenames: false
        language: system

      - id: esergo-snake-case-files-only
        name: esergo snake_case files only
        entry: filenames must be snake_case only
        language: fail
        files: 'apps/services/(?!\.test\.[jt]sx?$)[^a-z0-9_\.\/\[\]@]'
        exclude: |
          (?x)^(
            apps/services/Dockerfile|
            apps/services/Makefile|
            apps/services/README.md
          )$

      - id: rest-kebab-case-files-only
        name: rest kebab-case files only
        entry: filenames must be kebab-case only
        language: fail
        files: '(?!\.test\.[jt]sx?$)[^a-z0-9.\/\[\]@-]'
        exclude: |
          (?x)^(
            .claude/.*|
            .github/.*|
            .git/COMMIT_EDITMSG|
            AGENTS.md|
            CHANGELOG.md|
            CLAUDE.md|
            Makefile|
            VERSION|
            apps/services/.*|
            docs/.*|
            etc/coverage/.*|
            etc/temp/.*|
            etc/templates/.*/Makefile|
            etc/templates/.*/README.md|
            pkg/@eser/app-runtime/README.md|
            pkg/@eser/bundler/README.md|
            pkg/@eser/cache/README.md|
            pkg/@eser/cli/README.md|
            pkg/@eser/collector/README.md|
            pkg/@eser/config/README.md|
            pkg/@eser/cs/README.md|
            pkg/@eser/di/README.md|
            pkg/@eser/directives/README.md|
            pkg/@eser/events/README.md|
            pkg/@eser/fp/README.md|
            pkg/@eser/functions/README.md|
            pkg/@eser/http/README.md|
            pkg/@eser/jsx-runtime/README.md|
            pkg/@eser/laroux-bundler/README.md|
            pkg/@eser/laroux-react/README.md|
            pkg/@eser/laroux-server/README.md|
            pkg/@eser/logging/README.md|
            pkg/@eser/parsing/README.md|
            pkg/@eser/primitives/README.md|
            pkg/@eser/shell/README.md|
            pkg/@eser/standards/README.md|
            pkg/@eser/testing/README.md|
            pkg/@eser/writer/README.md|
            pkg/@cool/cli/README.md|
            pkg/@cool/lime/README.md|
            etc/templates/vite-app/README.md|
            Dockerfile|
            LICENSE|
            README.md
          )$
